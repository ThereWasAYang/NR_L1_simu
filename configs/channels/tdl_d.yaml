model: TDL                     # 信道模型：TDL
seed: null                     # 信道随机种子；null 表示回退到系统 random_seed，auto 表示每次运行随机生成
geometry:
  tx_position_m: [0.0, 0.0, 25.0]      # 发射机三维坐标，单位 m
  rx_position_m: [100.0, 0.0, 1.5]     # 接收机三维坐标，单位 m
  ue_velocity_vector_mps: [3.0, 0.0, 0.0]  # UE 速度向量，优先用于推导速度大小和运动方向，单位 m/s
params:
  profile: TDL-D               # 38.901 TDL profile
  delay_spread_ns: 300.0       # RMS delay spread，单位 ns
  delay_spread_profile: nominal  # delay_spread_ns 为 null 时使用的档位
  scenario_delay_spread_lookup: null  # 可选：自定义 delay spread 档位映射
  path_delays_ns: null         # 可选：显式逐径时延，单位 ns
  path_powers_db: null         # 可选：显式逐径功率，单位 dB
  ue_speed_mps: 3.0            # UE 速度大小；未配置速度向量时生效，单位 m/s
  ue_azimuth_deg: 0.0          # UE 运动方位角；未配置速度向量时生效，单位度
  ue_zenith_deg: 90.0          # UE 运动天顶角；未配置速度向量时生效，单位度
  num_sinusoids: 32            # Rayleigh/Rician 近似正弦数
  tdl_mimo_method: iid         # TDL MIMO 方法：iid / correlated / spatial_filter
  tdl_tx_correlation: null     # 可选：TX 相关矩阵
  tdl_rx_correlation: null     # 可选：RX 相关矩阵
  spatial_filter: null         # 可选：显式 spatial filter
  tx_antenna_spacing_lambda: 0.5  # TX ULA 天线间距，单位波长
  rx_antenna_spacing_lambda: 0.5  # RX ULA 天线间距，单位波长
  tx_array: null               # 可选：TX 阵列配置
  rx_array: null               # 可选：RX 阵列配置
  add_noise: true              # 是否添加噪声
  snr_db: 12.0                 # 接收信噪比，单位 dB
