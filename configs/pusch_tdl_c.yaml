# 载波与 numerology 配置
carrier:
  cell_bandwidth_rbs: 52        # 小区带宽，单位 PRB
  center_frequency_hz: 3500000000.0  # 小区/载波中心频率，单位 Hz；用于 OFDM 相位补偿和 TDL/CDL 信道载频
  subcarrier_spacing_khz: 30    # 子载波间隔，单位 kHz
  cyclic_prefix: NormalCP       # 循环前缀类型：NormalCP / ECP
  fft_size: null                # FFT 点数；null 表示自动选择满足带宽要求的最小 2 的整数次幂
  sample_rate_hz: null          # 基带采样率；null 表示按 FFT 点数和 SCS 自动计算

# BWP 配置
bwp:
  start_rb: 0                    # active BWP 起始 RB；相对当前小区频域网格
  num_rbs: null                  # active BWP 带宽，单位 PRB；null 表示等于小区带宽
  phase_compensation_enabled: true  # 是否启用 38.211 BWP/载频相位补偿

# 信道模型配置
channel:
  model: TDL                    # 信道模型：AWGN / TDL / CDL / EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD
  config_path: channels/tdl_c.yaml  # 独立信道配置文件路径；相对当前 YAML 所在目录
  seed: null                    # 信道随机种子；null 表示回退到 random_seed，auto 表示每次运行随机
  geometry:                     # link-level 辅助几何信息
    tx_position_m: [0.0, 0.0, 25.0]
    rx_position_m: [100.0, 0.0, 1.5]
    ue_velocity_vector_mps: [3.0, 0.0, 0.0]
  params:
    delay_spread_ns: 300.0      # 标准 profile 的 RMS delay spread，单位 ns；协议表中的归一化逐径时延会统一按它缩放
    path_delays_ns: null        # 可选：显式逐径时延列表，单位 ns；填写后将覆盖 profile*delay_spread 的时延
    path_powers_db: null        # 可选：显式逐径功率列表，单位 dB；需与 path_delays_ns 一一对应
    ue_speed_mps: 3.0           # UE 速度，单位 m/s
    snr_db: 12.0                # 接收信噪比，单位 dB

# 数据扰码配置
scrambling:
  rnti: 4660                    # RNTI
  n_id: 1                       # 数据扰码 N_ID
  data_scrambling_id: null      # 显式数据扰码 ID；null 表示回退到 n_id
  codeword_index: 0             # 码字索引 q

# 共享信道链路配置
link:
  channel_type: PUSCH           # 共享信道类型：PUSCH / PDSCH
  waveform: DFT-s-OFDM          # 波形类型：CP-OFDM / DFT-s-OFDM
  num_layers: 1                 # 传输层数
  num_codewords: 1              # 码字数；当前 PUSCH 固定为 1
  num_tx_ant: 2                 # 发射天线数
  num_rx_ant: 4                 # 接收天线数
  prb_start: 4                  # 资源分配起始 PRB
  num_prbs: 16                  # 用户占用带宽，单位 PRB
  start_symbol: 0               # 时域起始 OFDM symbol
  num_symbols: 14               # 时域连续占用 symbol 数
  mcs:
    table: tp64qam              # MCS table type：qam64 / qam256 / qam64lowse / tp64qam / tp64lowse；PDSCH 另支持 qam1024
    index: 10                   # MCS index
    tp_pi2bpsk: false           # transform-precoded PUSCH 低索引时是否启用 pi/2-BPSK
    rv: 0                       # 冗余版本号 RV
    x_overhead: 0               # TBS 计算中的 xOh

# DMRS 配置
dmrs:
  config_type: 1                # DMRS configuration type：1 / 2
  data_mux_enabled: false       # DFT-s-OFDM 下该项固定等效为 false；保留此字段便于统一配置结构
  mapping_type: A               # DMRS mapping type：A / B
  type_a_position: 2            # Type A DMRS 的首符号位置
  additional_positions: 1       # additionalPosition
  max_length: 1                 # DMRS length：1 / 2
  symbol_positions: []          # 显式 DMRS symbol 列表；空表示按协议规则自动推导
  scrambling_id0: 1             # DMRS scrambling ID 0
  scrambling_id1: null          # DMRS scrambling ID 1
  nid_nscid: null               # NIDNSCID；null 表示回退到默认扰码 ID
  n_scid: 0                     # NSCID
  n_pusch_identity: 1           # PUSCH-specific sequence identity
  num_cdm_groups_without_data: null  # 不带数据的 DMRS CDM group 数；null 表示按当前映射方式自动推导，并决定 DMRS 功率偏置
  sequence_hopping: false       # 是否启用 sequence hopping
  group_hopping: false          # 是否启用 group hopping
  uplink_transform_precoding: false  # 是否启用 transform-precoded PUSCH DMRS 分支
  pi2bpsk_scrambling_id0: null  # pi/2-BPSK DMRS scrambling ID 0
  pi2bpsk_scrambling_id1: null  # pi/2-BPSK DMRS scrambling ID 1
  port_set: [0]                 # DMRS 端口集合

# 仿真控制参数
simulation:
  num_ttis: 1                   # 连续仿真的 TTI 个数；大于 1 时统计最终 BLER（CRC 错包率）
  result_output_path: null      # 多 TTI 结果文本文件路径；null 表示不落盘
  bypass_channel_coding: false  # 是否跳过编码与译码；true 时以随机编码比特直接调制，且不做 CRC 校验

# 绘图控制参数
plotting:
  enabled: true                 # 是否启用本次仿真的所有绘图

waveform_input:
  waveform_path: null           # 灌数仿真输入文件；null 表示不启用
  format: text_iq               # 输入文件格式
  num_samples_per_tti: null     # 每个 TTI 样点数；null 表示自动推导
  noise_variance: null          # 输入波形噪声方差；null 表示按配置估计

decoder:
  ldpc_max_iterations: 25       # LDPC 最大迭代次数
  ldpc_min_sum_scaling: 0.75    # normalized min-sum 缩放因子
  ldpc_enable_py3gpp_fallback: true  # 本地译码失败时是否启用 py3gpp 兜底

harq:
  enabled: false                # 是否启用 HARQ
  num_processes: 4              # HARQ 进程数
  max_retransmissions: 3        # 最大重传次数
  rv_sequence: [0, 2, 3, 1]     # 冗余版本序列

# 仿真控制参数
random_seed: 7                  # 随机种子
slot_index: 0                   # 槽号
