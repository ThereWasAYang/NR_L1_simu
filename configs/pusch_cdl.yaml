# 载波与 numerology 配置
carrier:
  cell_bandwidth_rbs: 52
  center_frequency_hz: 3500000000.0  # 小区/载波中心频率，单位 Hz；用于 OFDM 相位补偿和 TDL/CDL 信道载频
  subcarrier_spacing_khz: 30
  cyclic_prefix: NormalCP
  fft_size: null
  sample_rate_hz: null

# BWP 配置
bwp:
  start_rb: 0                    # active BWP 起始 RB；相对当前小区频域网格
  num_rbs: null                  # active BWP 带宽，单位 PRB；null 表示等于小区带宽
  phase_compensation_enabled: true  # 是否启用 38.211 BWP/载频相位补偿

# 信道模型配置
channel:
  model: CDL                    # 信道模型：AWGN / TDL / CDL / EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD
  config_path: channels/cdl_a.yaml  # 独立信道配置文件路径；相对当前 YAML 所在目录
  seed: null                    # 信道随机种子；null 表示回退到 random_seed，auto 表示每次运行随机
  geometry:                     # link-level 辅助几何信息
    tx_position_m: [0.0, 0.0, 25.0]
    rx_position_m: [100.0, 0.0, 1.5]
    ue_velocity_vector_mps: [1.0, 0.0, 0.0]
  params:
    delay_spread_ns: 30.0           # RMS delay spread，单位 ns
    ue_speed_mps: 1.0               # UE 速度，单位 m/s
    ue_azimuth_deg: 0.0             # UE 运动方位角，单位度
    ue_zenith_deg: 90.0             # UE 运动天顶角，单位度
    snr_db: 20.0                    # 接收信噪比，单位 dB

# 数据扰码配置
scrambling:
  rnti: 4660
  n_id: 1
  data_scrambling_id: null
  codeword_index: 0

# 共享信道链路配置
link:
  channel_type: PUSCH
  waveform: CP-OFDM
  num_layers: 1
  num_codewords: 1
  num_tx_ant: 1
  num_rx_ant: 1
  prb_start: 4
  num_prbs: 24
  start_symbol: 0
  num_symbols: 14
  mcs:
    table: qam64
    index: 10
    tp_pi2bpsk: false
    rv: 0
    x_overhead: 0

# DMRS 配置
dmrs:
  config_type: 1
  data_mux_enabled: true
  mapping_type: A
  type_a_position: 2
  additional_positions: 1
  max_length: 1
  symbol_positions: []
  scrambling_id0: 1
  scrambling_id1: null
  nid_nscid: null
  n_scid: 0
  n_pusch_identity: 1
  num_cdm_groups_without_data: null
  sequence_hopping: false
  group_hopping: false
  uplink_transform_precoding: false
  pi2bpsk_scrambling_id0: null
  pi2bpsk_scrambling_id1: null
  port_set: [0]

simulation:
  num_ttis: 1                   # 连续仿真的 TTI 个数；大于 1 时统计最终 BLER（CRC 错包率）
  result_output_path: null      # 多 TTI 结果文本文件路径；null 表示不落盘
  bypass_channel_coding: false  # 是否跳过编码与译码；true 时以随机编码比特直接调制，且不做 CRC 校验

plotting:
  enabled: true

waveform_input:
  waveform_path: null
  format: text_iq
  num_samples_per_tti: null
  noise_variance: null

decoder:
  ldpc_max_iterations: 25
  ldpc_min_sum_scaling: 0.75
  ldpc_enable_py3gpp_fallback: true

harq:
  enabled: false
  num_processes: 4
  max_retransmissions: 3
  rv_sequence: [0, 2, 3, 1]

random_seed: 7
slot_index: 0
