# 载波与 numerology 配置
carrier:
  cell_bandwidth_rbs: 52
  subcarrier_spacing_khz: 30
  cyclic_prefix: NormalCP
  fft_size: null
  sample_rate_hz: null

# 信道模型配置
channel:
  model: CDL                     # 信道类型：AWGN / TDL / CDL / EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD
  params:
    profile: CDL-A                  # 38.901 CDL profile：CDL-A / CDL-B / CDL-C / CDL-D / CDL-E
    delay_spread_ns: 30.0           # RMS delay spread，单位 ns
    carrier_frequency_hz: 3500000000.0  # 载频，单位 Hz
    ue_speed_mps: 1.0               # UE 速度，单位 m/s
    ue_azimuth_deg: 0.0             # UE 运动方位角，单位度
    ue_zenith_deg: 90.0             # UE 运动天顶角，单位度
    num_sinusoids: 32               # LOS cluster 近似正弦数
    snr_db: 20.0                    # 接收信噪比，单位 dB
    frequency_response_path: null  # 外部频域信道系数文本文件路径；EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD 时可用
    frequency_response: null       # 外部频域信道系数数组；长度必须等于小区带宽子载波数
    time_domain_tap_length: null   # EXTERNAL_FREQRESP_TD 时保留的时域滤波 tap 数；null 表示保留 IFFT 全长

# 数据扰码配置
scrambling:
  rnti: 4660
  n_id: 1
  data_scrambling_id: null
  codeword_index: 0

# 共享信道链路配置
link:
  channel_type: PUSCH
  waveform: CP-OFDM
  num_layers: 1
  num_tx_ant: 1
  num_rx_ant: 1
  prb_start: 4
  num_prbs: 24
  start_symbol: 0
  num_symbols: 14
  mcs:
    table: qam64
    index: 10
    tp_pi2bpsk: false
    rv: 0
    x_overhead: 0

# DMRS 配置
dmrs:
  config_type: 1
  data_mux_enabled: true
  mapping_type: A
  type_a_position: 2
  additional_positions: 1
  max_length: 1
  symbol_positions: []
  scrambling_id0: 1
  scrambling_id1: null
  nid_nscid: null
  n_scid: 0
  n_pusch_identity: 1
  num_cdm_groups_without_data: null
  sequence_hopping: false
  group_hopping: false
  port_set: [0]

simulation:
  num_ttis: 1                   # 连续仿真的 TTI 个数；大于 1 时统计最终 BLER（CRC 错包率）
  result_output_path: null      # 多 TTI 结果文本文件路径；null 表示不落盘
  bypass_channel_coding: false  # 是否跳过编码与译码；true 时以随机编码比特直接调制，且不做 CRC 校验

plotting:
  enabled: true

random_seed: 7
slot_index: 0
