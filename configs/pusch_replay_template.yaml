# PUSCH 灌数仿真示例
# 该文件已配套仓库内的 inputs/pusch_capture.txt，可直接运行：
# python examples/run_from_config.py configs/pusch_replay_template.yaml

# 载波与 numerology 配置
carrier:
  cell_bandwidth_rbs: 52
  subcarrier_spacing_khz: 30
  cyclic_prefix: NormalCP
  fft_size: null
  sample_rate_hz: null

# 直接灌入接收机的时域波形文件配置
waveform_input:
  waveform_path: ../inputs/pusch_capture.txt  # 相对当前配置文件路径；仓库内置的时域 IQ 文本文件
  format: text_iq                             # 当前支持 text_iq
  num_samples_per_tti: null                   # 每根天线每个 TTI 的样点数；null 表示按当前 numerology 自动推导
  noise_variance: null                        # 已知噪声方差；null 表示按 snr_db 和信号功率估计

# 该模式下不会真正启用信道，但仍可用 snr_db 为接收机提供 MMSE/LLR 所需噪声估计
channel:
  model: AWGN                    # 信道类型：AWGN / TDL / CDL / EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD
  params:
    snr_db: 50.0
    frequency_response_path: null  # 外部频域信道系数文本文件路径；EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD 时可用
    frequency_response: null       # 外部频域信道系数数组；长度必须等于小区带宽子载波数
    time_domain_tap_length: null   # EXTERNAL_FREQRESP_TD 时保留的时域滤波 tap 数；null 表示保留 IFFT 全长

# 数据扰码配置
scrambling:
  rnti: 4660
  n_id: 1
  data_scrambling_id: null
  codeword_index: 0

# 共享信道链路配置
link:
  channel_type: PUSCH
  waveform: CP-OFDM
  num_layers: 1
  num_tx_ant: 1
  num_rx_ant: 1
  prb_start: 4
  num_prbs: 24
  start_symbol: 0
  num_symbols: 14
  mcs:
    table: qam64
    index: 10
    tp_pi2bpsk: false
    rv: 0
    x_overhead: 0

# DMRS 配置
dmrs:
  config_type: 1                # DMRS configuration type：1 / 2
  data_mux_enabled: true        # CP-OFDM 下导频符号是否允许数据与 DMRS 在同一 symbol 内按频域复用
  mapping_type: A               # DMRS mapping type：A / B
  type_a_position: 2            # Type A DMRS 的首符号位置
  additional_positions: 1       # additionalPosition
  max_length: 1                 # DMRS length：1 / 2
  symbol_positions: []          # 显式 DMRS symbol 列表；空表示按协议规则自动推导
  scrambling_id0: 1             # DMRS scrambling ID 0
  scrambling_id1: null          # DMRS scrambling ID 1
  nid_nscid: null               # NIDNSCID；null 表示回退到默认扰码 ID
  n_scid: 0                     # NSCID
  n_pusch_identity: 1           # PUSCH-specific sequence identity
  num_cdm_groups_without_data: null  # 不带数据的 DMRS CDM group 数；null 表示按当前映射方式自动推导，并决定 DMRS 功率偏置
  sequence_hopping: false       # 是否启用 sequence hopping
  group_hopping: false          # 是否启用 group hopping
  port_set: [0]                 # DMRS 端口集合

# 仿真控制参数
simulation:
  num_ttis: 1                   # 连续仿真的 TTI 个数；大于 1 时统计最终 BLER（CRC 错包率）
  result_output_path: null      # 多 TTI 结果文本文件路径；null 表示不落盘
  bypass_channel_coding: false  # 是否跳过编码与译码；回放模式通常保持 false，由接收机直接处理输入波形

plotting:
  enabled: true

random_seed: 7
slot_index: 0
