# PUSCH 底线测试用例 4
# 多 TTI，DFT-s-OFDM，256QAM MCS 表，MCS27，SNR=50 dB，AWGN。
# 期望：BLER = 0，平均 EVM < 2%。

# 载波与 numerology 配置
carrier:
  cell_bandwidth_rbs: 52
  subcarrier_spacing_khz: 30
  cyclic_prefix: NormalCP
  fft_size: null
  sample_rate_hz: null

# 信道模型配置
channel:
  model: AWGN
  params:
    snr_db: 50.0

# 数据扰码配置
scrambling:
  rnti: 4660
  n_id: 1
  data_scrambling_id: null
  codeword_index: 0

# 共享信道链路配置
link:
  channel_type: PUSCH
  waveform: DFT-s-OFDM
  num_layers: 1
  num_tx_ant: 1
  num_rx_ant: 1
  prb_start: 4
  num_prbs: 24
  start_symbol: 0
  num_symbols: 14
  mcs:
    table: qam256
    index: 27
    tp_pi2bpsk: false
    rv: 0
    x_overhead: 0

# DMRS 配置
dmrs:
  config_type: 1
  data_mux_enabled: false
  mapping_type: A
  type_a_position: 2
  additional_positions: 1
  max_length: 1
  symbol_positions: []
  scrambling_id0: 1
  scrambling_id1: null
  nid_nscid: null
  n_scid: 0
  n_pusch_identity: 1
  num_cdm_groups_without_data: null
  sequence_hopping: false
  group_hopping: false
  port_set: [0]

# 仿真控制参数
simulation:
  num_ttis: 20                  # 连续仿真的 TTI 个数；用于底线 BLER 校验
  result_output_path: null      # 多 TTI 结果文本文件路径；null 表示不落盘
  bypass_channel_coding: false  # 是否跳过编码与译码；底线用例要求保持标准协议链路

# 绘图控制参数
plotting:
  enabled: false

# 仿真控制参数
random_seed: 7
slot_index: 0
