# PUSCH 典型外部频域信道系数用例
# 使用外部输入的每子载波频域信道系数，直接在频域资源栅格上过信道。

# 载波与 numerology 配置
carrier:
  cell_bandwidth_rbs: 24        # 小区带宽，单位 PRB；因此频域信道系数文件长度需为 24*12=288
  subcarrier_spacing_khz: 30    # 子载波间隔，单位 kHz
  cyclic_prefix: NormalCP       # 循环前缀类型：NormalCP / ECP
  fft_size: null                # FFT 点数；null 表示自动选择满足带宽要求的最小 2 的整数次幂
  sample_rate_hz: null          # 基带采样率；null 表示按 FFT 点数和 SCS 自动计算

# 信道模型配置
channel:
  model: EXTERNAL_FREQRESP_FD   # 信道类型：AWGN / TDL / CDL / EXTERNAL_FREQRESP_TD / EXTERNAL_FREQRESP_FD
  params:
    snr_db: 25.0                # 加性白噪声信噪比，单位 dB
    frequency_response_path: ../inputs/siso_frequency_response_24rb_flat.txt  # 外部频域信道系数文本文件路径；SISO为每行1个复数，MIMO可每行用分号写Nrx*Ntx个复数
    frequency_response: null    # 若直接在 YAML 中给数组，则可填这里；SISO形状为(K)，MIMO形状为(K,Nrx,Ntx)
    time_domain_tap_length: null  # 仅 EXTERNAL_FREQRESP_TD 时使用；FD 直通模式下忽略

# 数据扰码配置
scrambling:
  rnti: 4660                    # RNTI
  n_id: 1                       # 数据扰码 N_ID
  data_scrambling_id: null      # 显式数据扰码 ID；null 表示回退到 n_id
  codeword_index: 0             # 码字索引 q

# 共享信道链路配置
link:
  channel_type: PUSCH           # 共享信道类型：PUSCH / PDSCH
  waveform: CP-OFDM             # 波形类型：CP-OFDM / DFT-s-OFDM；本用例示范 CP-OFDM 频域直通过信道
  num_layers: 1                 # 传输层数
  num_tx_ant: 1                 # 发射天线数；EXTERNAL_FREQRESP_FD 支持 MIMO，EXTERNAL_FREQRESP_TD 当前仅支持 SISO
  num_rx_ant: 1                 # 接收天线数；MIMO 文本文件每行需写 num_rx_ant*num_tx_ant 个复数
  prb_start: 4                  # 资源分配起始 PRB
  num_prbs: 16                  # 用户占用带宽，单位 PRB
  start_symbol: 0               # 时域起始 OFDM symbol
  num_symbols: 14               # 时域连续占用 symbol 数
  mcs:
    table: qam64                # MCS table type：qam64 / qam256 / qam64lowse / tp64qam / tp64lowse；PDSCH 另支持 qam1024
    index: 10                   # MCS index
    tp_pi2bpsk: false           # transform-precoded PUSCH 低索引时是否启用 pi/2-BPSK
    rv: 0                       # 冗余版本号 RV
    x_overhead: 0               # TBS 计算中的 xOh

# DMRS 配置
dmrs:
  config_type: 1                # DMRS configuration type：1 / 2
  data_mux_enabled: true        # CP-OFDM 下导频符号允许数据与 DMRS 在同一 symbol 内按频域复用
  mapping_type: A               # DMRS mapping type：A / B
  type_a_position: 2            # Type A DMRS 的首符号位置
  additional_positions: 1       # additionalPosition
  max_length: 1                 # DMRS length：1 / 2
  symbol_positions: []          # 显式 DMRS symbol 列表；空表示按协议规则自动推导
  scrambling_id0: 1             # DMRS scrambling ID 0
  scrambling_id1: null          # DMRS scrambling ID 1
  nid_nscid: null               # NIDNSCID；null 表示回退到默认扰码 ID
  n_scid: 0                     # NSCID
  n_pusch_identity: 1           # PUSCH-specific sequence identity
  num_cdm_groups_without_data: null  # 不带数据的 DMRS CDM group 数；null 表示按当前映射方式自动推导
  sequence_hopping: false       # 是否启用 sequence hopping
  group_hopping: false          # 是否启用 group hopping
  port_set: [0]                 # DMRS 端口集合

# 仿真控制参数
simulation:
  num_ttis: 1                   # 连续仿真的 TTI 个数
  result_output_path: null      # 多 TTI 结果文本文件路径；null 表示不落盘
  bypass_channel_coding: false  # 是否跳过编码与译码；true 时以随机编码比特直接调制，且不做 CRC 校验

# 绘图控制参数
plotting:
  enabled: true                 # 是否启用本次仿真的所有绘图

# 仿真控制参数
random_seed: 7                  # 随机种子
slot_index: 0                   # 槽号
